name: Build and Sign Android Release APK

on:
  push:
    tags:
      - 'v*.*.*'        # Triggers on semantic version tags, e.g. v1.2.0
  workflow_dispatch:     # Allows manual trigger from the Actions tab

permissions:
  contents: write        # Required to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6   # v4 — smarter build caching than v3

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Resolve Version Name
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "name=manual-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Rename Signed APK
        id: apk
        run: |
          OUT="app/build/outputs/apk/release/app-release-${{ steps.version.outputs.name }}.apk"
          mv "${{ steps.sign_app.outputs.signedReleaseFile }}" "$OUT"
          echo "path=$OUT" >> $GITHUB_OUTPUT

      - name: Upload Signed APK
        uses: actions/upload-artifact@v7
        with:
          name: SnapShop-Signed-Release-${{ steps.version.outputs.name }}
          path: ${{ steps.apk.outputs.path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true