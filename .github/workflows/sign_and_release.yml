name: Build and Sign Android Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create local.properties
        run: |
          echo "IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}" >> local.properties
          echo "SERPAPI_API_KEY=${{ secrets.SERPAPI_API_KEY }}" >> local.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      # Auto-detect the newest build-tools version installed on the runner.
      # This avoids hardcoding a version that may disappear in future runner images.
      - name: Detect Android Build Tools Version
        run: |
          BT=$(ls /usr/local/lib/android/sdk/build-tools/ | sort -V | tail -1)
          echo "Detected build-tools: $BT"
          echo "BUILD_TOOLS_VERSION=$BT" >> $GITHUB_ENV

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: ${{ env.BUILD_TOOLS_VERSION }}

      - name: Resolve Version Name
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "name=manual-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Rename Signed APK
        id: apk
        run: |
          OUT="app/build/outputs/apk/release/snapshop-release-${{ steps.version.outputs.name }}.apk"
          mv "${{ steps.sign_app.outputs.signedReleaseFile }}" "$OUT"
          echo "path=$OUT" >> $GITHUB_OUTPUT

      - name: Upload Signed APK
        uses: actions/upload-artifact@v7
        with:
          name: snapshop-release-${{ steps.version.outputs.name }}
          path: ${{ steps.apk.outputs.path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true